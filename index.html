<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montessori Album Repository | Elim Lee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #b45309; --paper: #fcfaf7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        
        .subject-card { 
            background: white; border: 1px solid #e2e8f0; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .subject-card:hover { transform: translateY(-4px); border-color: var(--gold); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }

        .lesson-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 0.75rem; border-radius: 0.75rem; font-size: 0.85rem;
            transition: all 0.2s; border: 1px solid transparent;
        }
        .lesson-row:hover { background: #fffbeb; }
        
        .status-btn { cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2.5px solid #e2e8f0; flex-shrink: 0; }
        
        /* State Styles */
        .state-pending .status-dot { background: transparent; }
        .state-pending .lesson-text { color: #94a3b8; }
        
        .state-progress .status-dot { background: #fbbf24; border-color: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
        .state-progress .lesson-text { color: #b45309; font-weight: 600; }
        
        .state-done .status-dot { background: #10b981; border-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .state-done .lesson-text { color: #059669; font-weight: 700; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <header class="max-w-7xl mx-auto mb-12 no-print">
        <div class="flex flex-col md:flex-row justify-between items-end gap-8 border-b-4 border-amber-100 pb-12">
            <div>
                <h1 class="serif text-7xl font-bold text-slate-900 tracking-tighter mb-4">Album Repository</h1>
                <div class="flex flex-wrap items-center gap-4">
                    <span class="bg-slate-900 text-white text-[10px] font-bold uppercase tracking-[0.3em] px-4 py-1.5 rounded-full">Elim Lee // AMI Elementary</span>
                    <span class="text-amber-600 font-bold serif italic text-2xl underline decoration-amber-200 decoration-4">Deadline Focus: April 1st, 2026</span>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="bg-white p-4 rounded-2xl shadow-xl border border-amber-50 text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Active Window</p>
                    <p class="font-bold text-slate-700">Sept '25 — April '26</p>
                </div>
                <button onclick="window.print()" class="bg-slate-900 text-white p-4 rounded-2xl hover:bg-black transition-all shadow-lg"><i data-lucide="printer"></i></button>
            </div>
        </div>
    </header>

    <main id="dashboard-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <!-- Categories populated by JS -->
    </main>

    <footer class="max-w-7xl mx-auto mt-24 border-t border-slate-200 pt-12 flex justify-between items-center text-[10px] uppercase font-bold tracking-[0.4em] text-slate-400 no-print">
        <p>Elim Lee // Modular Album Repository</p>
        <button onclick="resetData()" class="hover:text-red-500 transition-colors italic">Reset All Progress</button>
    </footer>

    <script>
        const categories = [
            {
                title: "Geography",
                icon: "globe",
                color: "cyan",
                lessons: [
                    { id: "geo_sun", title: "Sun and Earth", file: "sun-and-earth.html" },
                    { id: "geo_sphere", title: "Earth as a Sphere", file: "earth-as-sphere.html" },
                    { id: "geo_atmos", title: "Protection of Atmosphere", file: "protection-atmosphere.html" },
                    { id: "geo_temp", title: "Temperature Zones", file: "temp-zones.html" },
                    { id: "geo_air", title: "Work of Air (Winds)", file: "work-of-air.html" },
                    { id: "geo_water", title: "Work of Water", file: "work-of-water.html" }
                ]
            },
            {
                title: "Geometry",
                icon: "triangle",
                color: "emerald",
                lessons: [
                    { id: "g_euclid", title: "Euclid's Plate", file: "euclids-plate.html" },
                    { id: "g_pyth", title: "Pythagoras I & II", file: "pythagoras.html" },
                    { id: "g_area_y", title: "Area (Yellow)", file: "area-yellow.html" },
                    { id: "g_circle", title: "The Circle", file: "circle.html" },
                    { id: "g_solid", title: "Solid Geometry", file: "solid-geometry.html" }
                ]
            },
            {
                title: "Mathematics",
                icon: "calculator",
                color: "blue",
                lessons: [
                    { id: "m_multi", title: "Concept of Multiples", file: "multiples.html" },
                    { id: "m_dec1", title: "Decimal Fractions I", file: "decimals-1.html" },
                    { id: "m_dec2", title: "Decimal Fractions II", file: "decimals-2.html" },
                    { id: "m_alg", title: "Intro to Algebra", file: "algebra.html" },
                    { id: "m_cube", title: "Cubing", file: "cubing.html" }
                ]
            },
            {
                title: "Biology",
                icon: "leaf",
                color: "green",
                lessons: [
                    { id: "b_eco", title: "Ecology Series", file: "ecology-series.html" },
                    { id: "b_class", title: "Scientific Classification", file: "classification.html" },
                    { id: "b_flower", title: "Parts of the Flower", file: "flower-parts.html" },
                    { id: "b_river", title: "The Great River", file: "great-river.html" }
                ]
            }
        ];

        let db = JSON.parse(localStorage.getItem('elim_progress_db') || '{}');

        function toggleStatus(id) {
            const states = ['pending', 'progress', 'done'];
            const current = db[id] || 'pending';
            const next = states[(states.indexOf(current) + 1) % states.length];
            db[id] = next;
            localStorage.setItem('elim_progress_db', JSON.stringify(db));
            render();
        }

        function resetData() {
            if(confirm("Are you sure you want to reset your progress tracker?")) {
                db = {};
                localStorage.setItem('elim_progress_db', '{}');
                render();
            }
        }

        function render() {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = categories.map(cat => `
                <section class="subject-card p-8 rounded-[2.5rem]">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="bg-${cat.color}-600 p-2 rounded-xl text-white shadow-md"><i data-lucide="${cat.icon}" size="18"></i></div>
                        <h2 class="serif text-2xl font-bold">${cat.title}</h2>
                    </div>
                    <div class="space-y-1">
                        ${cat.lessons.map(l => {
                            const state = db[l.id] || 'pending';
                            return `
                                <div class="lesson-row state-${state}">
                                    <div class="status-btn" onclick="toggleStatus('${l.id}')">
                                        <div class="status-dot"></div>
                                        <a href="lessons/${cat.title.toLowerCase()}/${l.file}" 
                                           onclick="event.stopPropagation()" 
                                           class="lesson-text truncate hover:underline transition-all">
                                           ${l.title}
                                        </a>
                                    </div>
                                    ${state === 'done' ? '<i data-lucide="check" class="w-3 h-3 text-emerald-500 shrink-0"></i>' : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>
            `).join('');
            lucide.createIcons();
        }

        window.onload = render;
    </script>
</body>
</html>
