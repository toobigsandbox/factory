<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montessori Album Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Crimson Pro', serif; }
        
        @media print {
            .no-print { display: none !important; }
            #main-content { padding: 0 !important; background: white !important; }
            .lesson-card { box-shadow: none !important; border: none !important; padding: 0 !important; }
            body { background: white; }
        }

        /* Montessori Indentation Rule: Dialogue indented, Actions Left */
        .dialogue {
            margin-left: 2.5rem;
            font-style: italic;
            color: #4b5563;
            position: relative;
        }
        .dialogue::before {
            content: "•";
            position: absolute;
            left: -1.25rem;
            color: #d1d5db;
        }
        .action {
            font-weight: 600;
            color: #1f2937;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body class="bg-[#fcfaf7] text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-amber-100 px-6 py-4 flex justify-between items-center no-print sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-amber-600 p-2 rounded-xl text-white shadow-md">
                <i data-lucide="book-open"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-900 leading-none">Album Factory</h1>
                <p class="text-[10px] text-amber-600 uppercase tracking-widest font-bold mt-1">April 1st Deadline Edition</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="exportData()" class="p-2 text-slate-400 hover:text-amber-600 transition-colors" title="Backup All Lessons">
                <i data-lucide="download"></i>
            </button>
            <button onclick="window.print()" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-black transition-all shadow-lg">
                <i data-lucide="printer" class="w-4 h-4"></i> Print to PDF
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-80 border-r border-slate-200 bg-white flex flex-col no-print shrink-0">
            <div class="p-4 space-y-3">
                <button onclick="openModal()" class="w-full bg-amber-50 text-amber-700 border border-amber-200 p-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-amber-100 transition-all">
                    <i data-lucide="plus" class="w-5 h-5"></i> Add New Lesson
                </button>
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="searchInput" oninput="renderSidebar()" placeholder="Search 100+ lessons..." class="w-full bg-slate-50 border-none rounded-xl pl-10 pr-4 py-2 text-sm outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-amber-500 transition-all">
                </div>
            </div>
            <div id="lessonList" class="flex-1 overflow-y-auto px-2 pb-4 space-y-1">
                <!-- Lessons populated by JS -->
            </div>
            
            <!-- API Key Warning/Setup -->
            <div id="apiKeySection" class="p-4 bg-slate-50 border-t border-slate-200">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Gemini API Key</p>
                <input type="password" id="apiKeyInput" placeholder="Paste Key Here" class="w-full text-xs p-2 rounded border border-slate-200 outline-none focus:border-amber-500">
                <p class="text-[9px] text-slate-400 mt-1 italic">Saved to your browser only.</p>
            </div>
        </aside>

        <!-- Main Display -->
        <main id="main-content" class="flex-1 overflow-y-auto p-8 md:p-12 scroll-smooth">
            <div id="lessonDisplay" class="max-w-3xl mx-auto bg-white p-10 md:p-20 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 min-h-full">
                <!-- Welcome State -->
                <div id="welcomeState" class="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                    <i data-lucide="sparkles" class="w-16 h-16 mb-6 opacity-20"></i>
                    <p class="serif italic text-2xl text-slate-400">Ready to build your album</p>
                    <p class="text-sm mt-2 max-w-xs text-center">Add a lesson or select one from the sidebar to format and print.</p>
                </div>
                
                <div id="lessonContent" class="hidden serif">
                    <!-- Markdown content rendered here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add Lesson Modal -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden no-print p-4">
        <div class="bg-white w-full max-w-2xl rounded-[2rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold serif italic">New Album Entry</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-200 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Title</label>
                        <input type="text" id="newTitle" placeholder="The Pink Tower" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-amber-500 font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Area</label>
                        <input type="text" id="newArea" placeholder="Sensorial" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-amber-500">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Raw Notes / Transcript</label>
                    <textarea id="newRawText" placeholder="Paste your messy notes or transcript here..." class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-amber-500 min-h-[300px] text-sm leading-relaxed"></textarea>
                </div>
            </div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-500 hover:bg-slate-200 rounded-xl transition-all">Cancel</button>
                <button id="generateBtn" onclick="processLesson()" class="flex-[2] bg-amber-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-amber-700 transition-all shadow-lg shadow-amber-200">
                    <i data-lucide="wand-2" class="w-5 h-5"></i>
                    <span id="btnText">Format & Save</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Initialization ---
        let lessons = JSON.parse(localStorage.getItem('montessori_factory_lessons') || '{}');
        let selectedId = null;

        window.onload = () => {
            lucide.createIcons();
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
            renderSidebar();
        };

        // --- Core Functions ---
        function renderSidebar() {
            const list = document.getElementById('lessonList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = '';

            const keys = Object.keys(lessons).filter(k => 
                lessons[k].title.toLowerCase().includes(search) || 
                lessons[k].area.toLowerCase().includes(search)
            ).sort((a, b) => lessons[b].timestamp - lessons[a].timestamp);

            keys.forEach(id => {
                const lesson = lessons[id];
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-xl mb-1 flex justify-between items-center group transition-all border ${selectedId === id ? 'bg-amber-600 border-amber-500 text-white shadow-md' : 'hover:bg-slate-50 border-transparent'}`;
                btn.onclick = () => selectLesson(id);
                
                btn.innerHTML = `
                    <div class="truncate">
                        <p class="text-sm font-bold truncate">${lesson.title}</p>
                        <p class="text-[9px] uppercase font-bold tracking-wider ${selectedId === id ? 'text-amber-100' : 'text-slate-400'}">${lesson.area}</p>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                        <span onclick="event.stopPropagation(); deleteLesson('${id}')" class="p-1 hover:bg-red-500 rounded text-slate-300 hover:text-white transition-colors">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </span>
                    </div>
                `;
                list.appendChild(btn);
            });
            lucide.createIcons();
        }

        function selectLesson(id) {
            selectedId = id;
            const lesson = lessons[id];
            document.getElementById('welcomeState').classList.add('hidden');
            const content = document.getElementById('lessonContent');
            content.classList.remove('hidden');
            content.innerHTML = renderMarkdown(lesson.content);
            renderSidebar();
            lucide.createIcons();
        }

        async function processLesson() {
            const title = document.getElementById('newTitle').value;
            const area = document.getElementById('newArea').value;
            const rawText = document.getElementById('newRawText').value;
            const apiKey = document.getElementById('apiKeyInput').value;

            if (!title || !rawText) return alert("Please add a title and notes!");
            if (!apiKey) return alert("Please enter your Gemini API key in the sidebar first!");

            localStorage.setItem('gemini_api_key', apiKey);
            
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            btnText.innerText = "Processing...";

            const prompt = `
                Act as an AMI Montessori Trainer. Transform these raw notes into a shorthand "Blueprint" album page.
                
                FORMAT RULES:
                1. Use Markdown headers (# for Title, ## for Sections).
                2. ACTIONS: Write as plain text (left-justified).
                3. DIALOGUE: Start each dialogue line with a dash "- " to ensure it is indented.
                4. PLACEHOLDERS: Use [IMAGE: Description] for sketches.
                5. Keep it concise for a "survival" blueprint.
                
                TITLE: ${title}
                AREA: ${area}
                CONTENT: ${rawText}
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const formatted = data.candidates[0].content.parts[0].text;

                const id = 'l_' + Date.now();
                lessons[id] = { title, area, content: formatted, timestamp: Date.now() };
                saveLessons();
                closeModal();
                selectLesson(id);
            } catch (err) {
                console.error(err);
                alert("Error connecting to AI. Check your API key and internet connection.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                btnText.innerText = "Format & Save";
            }
        }

        function renderMarkdown(text) {
            return text.split('\n').map(line => {
                const clean = line.trim();
                if (clean.startsWith('# ')) return `<h1 class="text-4xl font-bold mb-8 border-b-2 border-amber-100 pb-4 text-slate-900 uppercase tracking-tight">${clean.slice(2)}</h1>`;
                if (clean.startsWith('## ')) return `<h2 class="text-xl font-bold mt-10 mb-4 border-l-4 border-amber-500 pl-4 text-slate-800">${clean.slice(3)}</h2>`;
                if (clean.startsWith('- ')) return `<p class="dialogue mb-3">${clean.slice(2)}</p>`;
                if (clean.startsWith('[IMAGE:')) return `
                    <div class="my-8 p-10 border-2 border-dashed border-slate-200 rounded-[2rem] bg-slate-50 flex flex-col items-center justify-center text-slate-400 no-print">
                        <i data-lucide="image" class="w-8 h-8 mb-2 opacity-30"></i>
                        <p class="text-[10px] font-bold uppercase tracking-widest mb-1">Illustration Box</p>
                        <p class="text-xs italic">${clean.slice(1, -1)}</p>
                    </div>
                    <div class="hidden print:block my-12 border-2 border-slate-200 rounded-xl h-48 w-full"></div>
                `;
                if (clean === '') return `<div class="h-2"></div>`;
                return `<p class="action mb-2">${clean}</p>`;
            }).join('');
        }

        // --- UI Utils ---
        function saveLessons() {
            localStorage.setItem('montessori_factory_lessons', JSON.stringify(lessons));
            renderSidebar();
        }

        function deleteLesson(id) {
            if (confirm("Delete this lesson from your database?")) {
                delete lessons[id];
                if (selectedId === id) {
                    selectedId = null;
                    document.getElementById('welcomeState').classList.remove('hidden');
                    document.getElementById('lessonContent').classList.add('hidden');
                }
                saveLessons();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(lessons, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `montessori_album_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function openModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('newTitle').value = "";
            document.getElementById('newArea').value = "";
            document.getElementById('newRawText').value = "";
        }

        function closeModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        // Close modal on escape
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
