<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Repository | Elim Lee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfbf7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        .subject-card { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; padding: 2rem; transition: all 0.3s ease; height: 100%; }
        .subject-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #cbd5e1; cursor: pointer; flex-shrink: 0; display: inline-block; }
        .state-pending .status-dot { background: transparent; }
        .state-progress .status-dot { background: #f59e0b; border-color: #f59e0b; }
        .state-done .status-dot { background: #10b981; border-color: #10b981; }
        .lesson-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0; font-size: 0.85rem; color: #64748b; transition: color 0.2s; text-decoration: none; }
        .lesson-link:hover { color: #b45309; text-decoration: underline; }
        .state-done .lesson-link { font-weight: 600; color: #1e293b; }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start gap-8">
        <div>
            <h1 class="serif text-6xl font-bold text-slate-900 tracking-tight mb-4">Album Repository</h1>
            <div class="flex flex-wrap items-center gap-3">
                <span class="bg-black text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Elim Lee // AMI Elementary</span>
                <span class="text-amber-600 italic font-bold serif text-xl">Target: April 1st</span>
            </div>
        </div>
    </header>

    <main id="repo-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Generated by Script -->
    </main>

    <footer class="max-w-7xl mx-auto mt-24 border-t border-slate-200 pt-12 text-center text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400">
        <p>AMI Elementary 6-12 Curriculum Archive // <span onclick="localStorage.clear(); location.reload();" class="cursor-pointer hover:text-red-500">Reset Status</span></p>
    </footer>

    <script>
        const REPO_DATA = {
            "Geography": { 
                color: "bg-cyan-500", 
                svg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
                lessons: [
                    { name: "God With No Hands", path: "god-with-no-hands.html" },
                    { name: "Earth as Sphere", path: "earth-as-sphere.html" },
                    { name: "Sun and Earth", path: "sun-and-earth.html" },
                    { name: "Protection Atmosphere", path: "protection-atmosphere.html" },
                    { name: "Temperature Zones", path: "temperature-zones.html" },
                    { name: "Work of Air", path: "work-of-air.html" },
                    { name: "Work of Water", path: "work-of-water.html" }
                ] 
            },
            "Geometry": { 
                color: "bg-emerald-500", 
                svg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/></svg>',
                lessons: [
                    { name: "Story of Geometry", path: "story-of-geometry.html" },
                    { name: "Nomenclature of Polygons", path: "nomenclature-of-polygons.html" },
                    { name: "Euclid's Plate", path: "euclids-plate.html" },
                    { name: "Pythagoras I & II", path: "pythagoras-i-ii.html" },
                    { name: "Area (Yellow Material)", path: "area-yellow-material.html" }
                ] 
            },
            "Math": { 
                color: "bg-blue-600", 
                svg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>',
                lessons: [
                    { name: "Story of Numerals", path: "story-of-numerals.html" },
                    { name: "Hierarchical Material", path: "hierarchical-material.html" },
                    { name: "Number Bases Conversion", path: "number-bases-conversion.html" },
                    { name: "Decimal Fractions I", path: "decimal-fractions-i.html" },
                    { name: "Decimal Fractions II", path: "decimal-fractions-ii.html" }
                ] 
            },
            "Biology": { 
                color: "bg-green-600", 
                svg: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C10 14.5 10.5 15 13 14c-2 3-1 6-4 8"/></svg>',
                lessons: [
                    { name: "Coming of Life", path: "coming-of-life.html" },
                    { name: "Plants' Story", path: "plants-story.html" },
                    { name: "Needs of Plant", path: "needs-of-plant.html" },
                    { name: "Scientific Classification", path: "scientific-classification.html" },
                    { name: "The Great River", path: "the-great-river.html" }
                ] 
            },
            "History": { color: "bg-stone-800", svg: '', lessons: [] },
            "Language": { color: "bg-orange-600", svg: '', lessons: [] },
            "Music": { color: "bg-indigo-600", svg: '', lessons: [] },
            "Theory": { color: "bg-rose-500", svg: '', lessons: [] }
        };

        let progress = JSON.parse(localStorage.getItem('album_tracker_v5')) || {};

        function save() { localStorage.setItem('album_tracker_v5', JSON.stringify(progress)); }

        function toggle(id) {
            const states = ['pending', 'progress', 'done'];
            const current = progress[id] || 'pending';
            progress[id] = states[(states.indexOf(current) + 1) % 3];
            save();
            render();
        }

        function render() {
            const grid = document.getElementById('repo-grid');
            grid.innerHTML = '';

            Object.entries(REPO_DATA).forEach(([title, data]) => {
                const section = document.createElement('section');
                section.className = 'subject-card';
                
                const lessonsHtml = data.lessons.map(lesson => {
                    const id = `${title.toLowerCase()}-${lesson.name.replace(/\s+/g, '-').toLowerCase()}`;
                    const state = progress[id] || 'pending';
                    const fullPath = `./lessons/${title.toLowerCase()}/${lesson.path}`;
                    
                    return `
                        <div class="state-${state} flex items-center gap-3">
                            <div class="status-dot" onclick="toggle('${id}')"></div>
                            <a href="${fullPath}" class="lesson-link">${lesson.name}</a>
                        </div>
                    `;
                }).join('');

                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <div class="${data.color} p-2 rounded-xl text-white">${data.svg || ''}</div>
                        <h2 class="serif text-2xl font-bold text-slate-800">${title}</h2>
                    </div>
                    <div class="space-y-1">${lessonsHtml}</div>
                `;
                grid.appendChild(section);
            });
        }
        render();
    </script>
</body>
</html>
