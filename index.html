<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Repository | Elim Lee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfbf7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: #1e293b; min-height: 100vh; }
        .serif { font-family: 'Crimson Pro', serif; }
        .subject-card { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; padding: 2rem; transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column; }
        .subject-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #cbd5e1; cursor: pointer; flex-shrink: 0; display: inline-block; }
        .state-pending .status-dot { background: transparent; }
        .state-progress .status-dot { background: #f59e0b; border-color: #f59e0b; }
        .state-done .status-dot { background: #10b981; border-color: #10b981; }
        .lesson-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0; font-size: 0.85rem; color: #64748b; transition: color 0.2s; text-decoration: none; }
        .lesson-link:hover { color: #b45309; text-decoration: underline; }
        .state-done .lesson-link { font-weight: 600; color: #1e293b; }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-20">

    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start gap-8">
        <div>
            <h1 class="serif text-6xl font-bold text-slate-900 tracking-tight mb-4">Album Repository</h1>
            <div class="flex flex-wrap items-center gap-3">
                <span class="bg-black text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Elim Lee // AMI Elementary Submission</span>
                <span class="text-amber-600 italic font-bold serif text-xl underline decoration-amber-200">2025-2026 Academic Cycle</span>
            </div>
        </div>
    </header>

    <main id="repo-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
        <!-- JS will populate cards here -->
    </main>

    <footer class="max-w-7xl mx-auto mt-12 border-t border-slate-200 pt-12 text-center text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400">
        <p>AMI Elementary 6-12 Curriculum Archive // <span onclick="localStorage.clear(); location.reload();" class="cursor-pointer hover:text-red-500">Reset Tracker State</span></p>
    </footer>

    <script>
        const REPO_DATA = {
            "Geography": { 
                color: "bg-cyan-500", 
                lessons: ["God With No Hands", 
                          "Earth as Sphere", 
                          "Sun and Earth", 
                          "Protection Atmosphere", 
                          "Temperature Zones", 
                          "Formation of Mountains",
                          "Work of Water",
                          "Parts of a River",
                          "Rivers: Highlands to Lowlands",
                          "Water Cycle",
                          "Ocean Waves & Landforms",
                          "Work of Air", 
                          "Economic Geography"
                ] 
            },
            "Geometry": { 
                color: "bg-emerald-500", 
                lessons: [
                    "Nomenclature of Solids", 
                    "Building Volume Cubes", 
                    "Visualizing Marked Prisms", 
                    "Three Dimensions Volume",
                    "Volume Rectangular Prism",
                    "Triangular Prisms",
                    "Rhombic Prisms",
                    "Hexagonal Prisms",
                    "Solids of Rotation",
                    "Volume Cylinder Cone",
                    "Volume of Pyramids",
                    "Archimedes Method",
                    "Surface Area of Solids",
                    "Polyhedrons"
                ] 
            },
            "Math": { 
                color: "bg-blue-600", 
                lessons: ["Number Bases Conversion",
                          "Other Number Bases",
                          "Conversion One Base to Another",
                          "Number Base Resources",
                          "Decimal Fractions I", "Balancing Equations: Addition"] 
            },
            "Biology": { 
                color: "bg-green-600", 
                lessons: ["Coming of Life",
                          "Plants Story", 
                          "Needs of Plant", 
                          "Scientific Classification", 
                          "The Great River"] 
            },
            "History": { 
                color: "bg-stone-800", 
                lessons: ["The Black Strip", 
                          "Coming of Human Beings", 
                          "Hand Timeline", 
                          "Clock of Eras", 
                          "Fundamental Needs"] 
            },
            "Language": { 
                color: "bg-orange-600", 
                lessons: ["Written Language", 
                          "Grammar Boxes", 
                          "Logical Analysis", 
                          "Word Study"] 
            },
            "Music": { 
                color: "bg-indigo-600", 
                lessons: ["Singing with Scale", 
                          "Rhythm Patterns", 
                          "Tone Bars"] 
            },
            "Theory": { 
                color: "bg-rose-500", 
                lessons: ["Four Planes", 
                          "Cosmic Education", 
                          "Going Out", 
                          "Observation", 
                          "Freedom & Responsibility"] 
            }
        };

        let progress = JSON.parse(localStorage.getItem('album_tracker_v7_stable')) || {};

        function save() { localStorage.setItem('album_tracker_v7_stable', JSON.stringify(progress)); }

        function toggle(id) {
            const states = ['pending', 'progress', 'done'];
            const current = progress[id] || 'pending';
            progress[id] = states[(states.indexOf(current) + 1) % 3];
            save();
            render();
        }

        function render() {
            const grid = document.getElementById('repo-grid');
            grid.innerHTML = '';

            Object.entries(REPO_DATA).forEach(([title, data]) => {
                const section = document.createElement('section');
                section.className = 'subject-card';
                
                const lessonsHtml = data.lessons.map(lesson => {
                    const id = `${title.toLowerCase()}-${lesson.replace(/\s+/g, '-').toLowerCase()}`;
                    const state = progress[id] || 'pending';
                    
                    // Specific path normalization
                    const cleanName = lesson.replace(/'/g, '').replace(/\s+/g, '-').toLowerCase();
                    const path = `./lessons/${title.toLowerCase()}/${cleanName}.html`;
                    
                    return `
                        <div class="state-${state} flex items-center gap-3">
                            <div class="status-dot" onclick="toggle('${id}')"></div>
                            <a href="${path}" class="lesson-link">${lesson}</a>
                        </div>
                    `;
                }).join('');

                section.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <div class="${data.color} w-2 h-8 rounded-full"></div>
                        <h2 class="serif text-2xl font-bold text-slate-800">${title}</h2>
                    </div>
                    <div class="space-y-1">${lessonsHtml}</div>
                `;
                grid.appendChild(section);
            });
        }
        render();
    </script>
</body>
</html>
