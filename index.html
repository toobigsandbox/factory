<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Repository | Elim Lee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --paper: #fdfbf7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        
        .subject-card {
            background: white;
            border-radius: 3rem;
            border: 1px solid #e2e8f0;
            padding: 2.5rem 2rem;
            transition: all 0.3s ease;
            height: 100%;
        }
        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .state-pending .status-dot { background: transparent; }
        .state-progress .status-dot { background: #f59e0b; border-color: #f59e0b; }
        .state-done .status-dot { background: #10b981; border-color: #10b981; }

        .lesson-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0;
            font-size: 0.85rem;
            color: #64748b;
            transition: color 0.2s;
        }
        .lesson-link:hover { color: #1e293b; text-decoration: underline; }
        .state-done .lesson-link { font-weight: 600; color: #1e293b; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-8 md:p-16 lg:p-24">

    <header class="max-w-7xl mx-auto mb-16 flex flex-col md:flex-row justify-between items-start gap-8">
        <div>
            <h1 class="serif text-7xl font-bold text-slate-900 tracking-tight mb-6">Album Repository</h1>
            <div class="flex flex-wrap items-center gap-4">
                <span class="bg-black text-white px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">Elim Lee // AMI Elementary</span>
                <span class="text-amber-600 italic font-bold serif text-xl">Deadline Focus: April 1st, 2026</span>
            </div>
        </div>

        <div class="no-print flex items-center gap-4">
            <div class="bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Active Window</p>
                <p class="font-bold text-slate-700 text-sm">Sept '25 — April '26</p>
            </div>
            <button onclick="window.print()" class="bg-slate-900 text-white p-4 rounded-2xl hover:bg-black transition-all shadow-lg">
                <i data-lucide="printer" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        
        <!-- Geography -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-cyan-500 p-2.5 rounded-xl text-white"><i data-lucide="globe" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Geography</h2>
            </div>
            <div id="geography-list" class="space-y-1"></div>
        </section>

        <!-- Geometry -->
        <section class="subject-card border-amber-200 shadow-xl shadow-amber-50">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-emerald-500 p-2.5 rounded-xl text-white"><i data-lucide="triangle" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Geometry</h2>
            </div>
            <div id="geometry-list" class="space-y-1"></div>
        </section>

        <!-- Mathematics -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-blue-600 p-2.5 rounded-xl text-white"><i data-lucide="calculator" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Mathematics</h2>
            </div>
            <div id="math-list" class="space-y-1"></div>
        </section>

        <!-- Biology -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-green-600 p-2.5 rounded-xl text-white"><i data-lucide="leaf" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Biology</h2>
            </div>
            <div id="biology-list" class="space-y-1"></div>
        </section>

        <!-- History -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-stone-800 p-2.5 rounded-xl text-white"><i data-lucide="history" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">History</h2>
            </div>
            <div id="history-list" class="space-y-1"></div>
        </section>

        <!-- Language -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-orange-600 p-2.5 rounded-xl text-white"><i data-lucide="type" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Language</h2>
            </div>
            <div id="language-list" class="space-y-1"></div>
        </section>

        <!-- Music -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white"><i data-lucide="music" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Music</h2>
            </div>
            <div id="music-list" class="space-y-1"></div>
        </section>

        <!-- Theory -->
        <section class="subject-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="bg-rose-500 p-2.5 rounded-xl text-white"><i data-lucide="book-open" class="w-6 h-6"></i></div>
                <h2 class="serif text-3xl font-bold text-slate-800">Theory</h2>
            </div>
            <div id="theory-list" class="space-y-1"></div>
        </section>

    </main>

    <footer class="max-w-7xl mx-auto mt-24 border-t border-slate-200 pt-12 text-center text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400 no-print">
        <div class="flex justify-between items-center">
            <p>AMI Elementary 6-12 Curriculum Archive</p>
            <button onclick="resetStorage()" class="hover:text-red-500">Reset Tracker</button>
        </div>
    </footer>

    <script>
        const REPO_DATA = {
            geography: ["God With No Hands", "Earth as a Sphere", "Sun and Earth", "Protection of Atmosphere", "Temperature Zones", "Work of Air", "Work of Water"],
            geometry: ["Story of Geometry", "Nomenclature of Polygons", "Euclid's Plate", "Pythagoras I & II", "Area (Yellow Material)"],
            math: ["Story of Numerals", "Hierarchical Material", "Multiples & Factors", "Decimal Fractions I", "Decimal Fractions II"],
            biology: ["Coming of Life", "Plants' Story", "Needs of Plant", "Scientific Classification", "The Great River"],
            history: ["The Black Strip", "Coming of Human Beings", "Hand Timeline", "Clock of Eras", "Fundamental Needs"],
            language: ["Written Language", "Spoken Language", "Grammar Boxes", "Word Study", "Logical Analysis"],
            music: ["Singing with Scale", "Rhythm Patterns", "Tone Bars"],
            theory: ["Four Planes", "Cosmic Education", "Freedom & Responsibility", "Going Out", "Observation"]
        };

        let progress = JSON.parse(localStorage.getItem('master_repo_v2')) || {};

        function save() { localStorage.setItem('master_repo_v2', JSON.stringify(progress)); }

        function toggle(id) {
            const states = ['pending', 'progress', 'done'];
            const current = progress[id] || 'pending';
            progress[id] = states[(states.indexOf(current) + 1) % 3];
            save();
            render();
        }

        function resetStorage() { if(confirm("Reset all status marks?")) { progress = {}; save(); render(); } }

        function render() {
            Object.keys(REPO_DATA).forEach(area => {
                const container = document.getElementById(`${area}-list`);
                if (!container) return;
                container.innerHTML = REPO_DATA[area].map(lesson => {
                    const id = `${area}-${lesson.replace(/\s+/g, '-').toLowerCase()}`;
                    
                    // CLEANING THE PATH: Remove apostrophes and replace spaces with dashes
                    const cleanFileName = lesson.replace(/'/g, '').replace(/\s+/g, '-').toLowerCase();
                    const path = `lessons/${area}/${cleanFileName}.html`;
                    
                    return `
                        <div class="state-${state} flex items-center gap-3">
                            <div class="status-dot" onclick="toggle('${id}')"></div>
                            <a href="${path}" class="lesson-link">${lesson}</a>
                        </div>
                    `;
                }).join('');
            });
            lucide.createIcons();
        }

        window.onload = render;
    </script>
</body>
</html>
