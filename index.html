<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montessori Album Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fdfbf7; color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #cbd5e1; cursor: pointer; transition: 0.2s; display: inline-block; }
        .status-pending { background: transparent; }
        .status-progress { background: #f59e0b; border-color: #f59e0b; }
        .status-done { background: #10b981; border-color: #10b981; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        
        .dialogue { margin-left: 2rem; font-style: italic; color: #475569; position: relative; margin-bottom: 0.5rem; border-left: 2px solid #e2e8f0; padding-left: 1rem; }
        .illustrate { border: 2px dashed #cbd5e1; border-radius: 12px; height: 160px; margin: 1.5rem 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; background: #f8fafc; text-align: center; padding: 1rem; }
        
        table { border-collapse: separate; border-spacing: 0; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header Section -->
    <header class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-end border-b-4 border-amber-100 pb-6 gap-4">
        <div>
            <h1 class="serif text-5xl font-bold">Album Spreadsheet</h1>
            <p class="text-amber-600 font-bold uppercase tracking-widest text-xs mt-2">September–April Sprint // Tracker</p>
        </div>
        <div class="flex gap-4 items-center w-full md:w-auto">
            <input type="password" id="apiKey" placeholder="Paste Gemini API Key" class="bg-white border rounded-lg px-4 py-2 text-xs w-full md:w-48 shadow-sm">
            <button onclick="exportData()" class="p-2 text-slate-400 hover:text-slate-600" title="Download Backup">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>
    </header>

    <!-- Spreadsheet Grid -->
    <main class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto max-h-[70vh]">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400 w-16 text-center">Status</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">Lesson Title</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400 w-32 text-center">Area</th>
                            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-400 text-right">Factory</th>
                        </tr>
                    </thead>
                    <tbody id="spreadsheetBody">
                        <!-- Content loaded by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Factory Modal (The Processor) -->
    <div id="factoryModal" class="modal">
        <div class="bg-white w-full max-w-6xl h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden m-4">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <h2 id="modalTitle" class="serif text-2xl font-bold italic text-slate-900">Lesson Title</h2>
                    <p id="modalArea" class="text-[10px] font-bold text-amber-600 uppercase tracking-widest">Subject Area</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-200 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            
            <div class="flex-1 flex overflow-hidden">
                <div class="w-full md:w-1/2 p-8 border-r overflow-y-auto flex flex-col gap-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Paste Transcript or Messy Notes</label>
                    <textarea id="rawInput" class="flex-1 w-full p-6 bg-slate-50 border-none rounded-2xl text-sm leading-relaxed outline-none focus:ring-2 focus:ring-amber-500 resize-none shadow-inner" placeholder="Paste your raw audio transcript or notes here..."></textarea>
                    <button id="generateBtn" onclick="processAI()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-black">
                        <span id="btnText">Format into Album Page</span>
                    </button>
                </div>
                
                <div class="hidden md:block w-1/2 p-8 bg-[#f8fafc] overflow-y-auto">
                    <div id="previewArea" class="bg-white p-12 rounded-[2rem] shadow-sm serif hidden"></div>
                    <div id="emptyPreview" class="h-full flex flex-col items-center justify-center text-slate-300 italic border-4 border-dashed border-white rounded-[2rem]">
                        <p>Waiting for generation...</p>
                    </div>
                </div>
            </div>
            
            <div class="p-6 border-t bg-slate-50 flex justify-end gap-4">
                <button onclick="copyHtml()" class="px-4 py-2 text-xs font-bold text-slate-400 hover:text-amber-600 uppercase tracking-widest">Copy Code</button>
                <button onclick="markDoneFromModal()" class="bg-emerald-600 text-white px-8 py-2 rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg">Mark Done & Close</button>
            </div>
        </div>
    </div>

    <script>
        // Full Lesson Index
        const MASTER_INDEX = {
            GEOGRAPHY: ["God With No Hands", "Earth as a Sphere", "Sun and Earth", "Protection of the Atmosphere", "Temperature Zones", "Work of Air", "Work of Water", "Economic Geography"],
            GEOMETRY: ["Story of Geometry", "Nomenclature of Polygons", "Euclid's Plate", "Pythagoras Plates I & II", "Area (Yellow Material)"],
            MATH: ["Hierarchical Material", "Multiples & Factors", "Decimal Fractions I", "Decimal Fractions II", "Dividing Decimals on Paper", "Algebra Intro"],
            BIOLOGY: ["Coming of Life", "The Plants' Story", "Interdependence", "Ecology Series", "The Great River"],
            HISTORY: ["The Black Strip", "Clock of Eras", "Fundamental Human Needs", "Ancient River Civilizations"],
            LANGUAGE: ["History of Written Language", "Grammar Boxes Intro", "Logical Analysis", "Verb Tenses"]
        };

        let database = JSON.parse(localStorage.getItem('montessori_v5_vanilla') || '{}');
        let currentLessonKey = null;

        function init() {
            if (Object.keys(database).length === 0) {
                Object.entries(MASTER_INDEX).forEach(([subject, list]) => {
                    list.forEach(title => {
                        database[title] = { title, subject, status: 'pending', content: '', notes: '' };
                    });
                });
                save();
            }
            renderSpreadsheet();
            document.getElementById('apiKey').value = localStorage.getItem('gemini_api_key') || '';
        }

        function save() {
            localStorage.setItem('montessori_v5_vanilla', JSON.stringify(database));
        }

        function renderSpreadsheet() {
            const body = document.getElementById('spreadsheetBody');
            body.innerHTML = '';
            Object.values(database).forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'row-hover border-b border-slate-50';
                tr.innerHTML = `
                    <td class="px-6 py-4 text-center">
                        <div onclick="cycleStatus('${item.title}')" class="dot status-${item.status}"></div>
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-700 text-sm">${item.title}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-[9px] font-bold px-2 py-1 bg-slate-100 rounded text-slate-400 tracking-wider uppercase">${item.subject}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="openFactory('${item.title}')" class="p-2 text-slate-300 hover:text-amber-600">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 3m-3-3l-3 3m3-3v12M2 17l1 2h18l1-2"/></svg>
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function cycleStatus(title) {
            const statuses = ['pending', 'progress', 'done'];
            database[title].status = statuses[(statuses.indexOf(database[title].status) + 1) % 3];
            save();
            renderSpreadsheet();
        }

        function openFactory(title) {
            currentLessonKey = title;
            const lesson = database[title];
            document.getElementById('modalTitle').innerText = lesson.title;
            document.getElementById('modalArea').innerText = lesson.subject;
            document.getElementById('rawInput').value = lesson.notes || '';
            document.getElementById('previewArea').innerHTML = lesson.content || '';
            
            if (lesson.content) {
                document.getElementById('previewArea').classList.remove('hidden');
                document.getElementById('emptyPreview').classList.add('hidden');
            } else {
                document.getElementById('previewArea').classList.add('hidden');
                document.getElementById('emptyPreview').classList.remove('hidden');
            }
            document.getElementById('factoryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('factoryModal').classList.remove('active'); }

        async function processAI() {
            const key = document.getElementById('apiKey').value;
            const input = document.getElementById('rawInput').value;
            if (!key) return alert("Paste your Gemini API Key first!");
            if (!input) return alert("Paste some notes to process!");

            localStorage.setItem('gemini_api_key', key);
            document.getElementById('btnText').innerText = "Processing...";
            document.getElementById('generateBtn').disabled = true;

            const prompt = `AMI Montessori format. Headers: # ##. Actions: bold. Dialogue: indented with - and italic. Lesson: ${database[currentLessonKey].title}. Notes: ${input}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                
                // Very simple markdown-to-html converter
                const html = result
                    .replace(/^# (.*$)/gim, '<h1 class="text-3xl font-bold mb-4">$1</h1>')
                    .replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-2 text-amber-600">$1</h2>')
                    .replace(/^- (.*$)/gim, '<div class="dialogue">$1</div>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\[IMAGE: (.*?)\]/g, '<div class="illustrate">$1</div>')
                    .split('\n').join('<br>');

                database[currentLessonKey].content = html;
                database[currentLessonKey].notes = input;
                document.getElementById('previewArea').innerHTML = html;
                document.getElementById('previewArea').classList.remove('hidden');
                document.getElementById('emptyPreview').classList.add('hidden');
                save();
            } catch (e) { alert("AI Error. Check your key."); }
            
            document.getElementById('btnText').innerText = "Format into Album Page";
            document.getElementById('generateBtn').disabled = false;
        }

        function markDoneFromModal() {
            database[currentLessonKey].status = 'done';
            save(); renderSpreadsheet(); closeModal();
        }

        function copyHtml() {
            navigator.clipboard.writeText(document.getElementById('previewArea').innerHTML);
            alert("Copied!");
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(database)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "curriculum_backup.json";
            a.click();
        }

        init();
    </script>
</body>
</html>
