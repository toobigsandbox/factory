<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montessori Album Factory & Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #b45309; --paper: #fcfaf7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        
        /* Spreadsheet Grid Styles */
        .spreadsheet-table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .spreadsheet-table th { background: #f8fafc; padding: 12px 24px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        .spreadsheet-table td { padding: 14px 24px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .row-hover:hover { background-color: #fffbeb; }

        /* Status Dot Logic */
        .status-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #cbd5e1; cursor: pointer; transition: all 0.2s; position: relative; }
        .status-dot:hover { transform: scale(1.2); }
        .state-pending .status-dot { background: transparent; }
        .state-progress .status-dot { background: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .state-done .status-dot { background: #10b981; border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        /* AI Preview Content Styles */
        .preview-container .dialogue { margin-left: 2rem; font-style: italic; color: #475569; position: relative; margin-bottom: 0.75rem; border-left: 2px solid #e2e8f0; padding-left: 1rem; }
        .preview-container .illustrate { border: 2px dashed #cbd5e1; border-radius: 12px; height: 160px; margin: 1.5rem 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; background: #f8fafc; }
        
        /* Printing */
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root">
        <div class="h-screen flex items-center justify-center bg-[#fcfaf7] text-slate-400 font-serif italic">
            Initializing Album Factory...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            CheckCircle2, Clock, Copy, Download, FileText, Layers, Layout, Loader2, Printer, Search, Wand2, ChevronRight, X, Trash2, Globe, Triangle, Calculator, Leaf, Save
        } = lucide;

        // --- MASTER CURRICULUM DATA ---
        const MASTER_INDEX = {
            GEOGRAPHY: ["God With No Hands", "Composition of the Earth", "Earth as a Sphere", "Sun and Earth", "Protection of the Atmosphere", "Temperature Zones", "Work of Air", "Work of Water"],
            GEOMETRY: ["Story of Geometry", "Nomenclature of Polygons", "Euclid's Plate", "Pythagoras Plates I & II", "Area (Yellow Material)", "Solid Geometry"],
            MATH: ["Hierarchical Material", "Multiples & Factors", "Decimal Fractions I", "Decimal Fractions II", "Dividing Decimals on Paper", "Algebra Intro"],
            BIOLOGY: ["Coming of Life", "The Plants' Story", "Interdependence", "Ecology Series", "The Great River", "Scientific Classification"],
            HISTORY: ["The Black Strip", "Clock of Eras", "Fundamental Human Needs", "Ancient River Civilizations", "Migration Charts"],
            LANGUAGE: ["History of Written Language", "Grammar Boxes Intro", "Logical Analysis", "Verb Tenses", "Written Expression"]
        };

        const App = () => {
            const [lessons, setLessons] = useState({});
            const [view, setView] = useState('DASHBOARD'); // DASHBOARD = Spreadsheet
            const [activeLesson, setActiveLesson] = useState(null);
            const [rawInput, setRawInput] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [generatedHtml, setGeneratedHtml] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');

            useEffect(() => {
                const saved = localStorage.getItem('montessori_album_v4');
                if (saved) {
                    setLessons(JSON.parse(saved));
                } else {
                    const initial = {};
                    Object.entries(MASTER_INDEX).forEach(([subject, list]) => {
                        list.forEach(title => {
                            initial[title] = { title, subject, status: 'PENDING', content: '', notes: '' };
                        });
                    });
                    setLessons(initial);
                }
            }, []);

            useEffect(() => {
                if (Object.keys(lessons).length > 0) localStorage.setItem('montessori_album_v4', JSON.stringify(lessons));
            }, [lessons]);

            useEffect(() => { lucide.createIcons(); }, [view, lessons]);

            const cycleStatus = (title) => {
                setLessons(prev => {
                    const current = prev[title].status;
                    const next = current === 'PENDING' ? 'PROGRESS' : (current === 'PROGRESS' ? 'DONE' : 'PENDING');
                    return { ...prev, [title]: { ...prev[title], status: next } };
                });
            };

            const processAI = async () => {
                if (!apiKey) return alert("Please enter your Gemini API Key in the top-right box first!");
                setIsProcessing(true);
                localStorage.setItem('gemini_api_key', apiKey);

                const prompt = `AMI Montessori formatting. Actions: bold. Dialogue: indented with — and italic. Formatting for: ${activeLesson.title}. Notes: ${rawInput}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (result) {
                        setGeneratedHtml(result);
                        setLessons(prev => ({ ...prev, [activeLesson.title]: { ...prev[activeLesson.title], content: result, notes: rawInput, status: 'PROGRESS' } }));
                    }
                } catch (e) { alert("AI Connection Error. Check your key."); }
                setIsProcessing(false);
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Header */}
                    <header className="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="bg-amber-600 p-2.5 rounded-2xl text-white shadow-lg"><Layers size={22} /></div>
                            <div>
                                <h1 className="font-bold text-slate-900 leading-none text-lg">Album Factory</h1>
                                <p className="text-[10px] text-amber-600 uppercase font-bold tracking-widest mt-1">Elim Lee // April 1st Milestone</p>
                            </div>
                        </div>

                        <nav className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setView('DASHBOARD')} className={`px-6 py-2 rounded-lg text-xs font-bold transition-all ${view === 'DASHBOARD' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>SPREADSHEET</button>
                            <button onClick={() => setView('PROCESSOR')} className={`px-6 py-2 rounded-lg text-xs font-bold transition-all ${view === 'PROCESSOR' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>PROCESSOR</button>
                        </nav>

                        <div className="flex gap-4 items-center">
                            <input type="password" placeholder="Gemini API Key" value={apiKey} onChange={e => setApiKey(e.target.value)} className="text-[10px] p-2.5 border rounded-xl w-40 outline-none focus:ring-2 focus:ring-amber-500 bg-slate-50" />
                        </div>
                    </header>

                    {/* Dashboard View (The Spreadsheet) */}
                    {view === 'DASHBOARD' ? (
                        <main className="flex-1 p-10 overflow-y-auto">
                            <div className="max-w-6xl mx-auto">
                                <h2 className="serif text-3xl font-bold italic mb-8">Curriculum Spreadsheet</h2>
                                <div className="spreadsheet-table overflow-hidden border border-slate-200">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr>
                                                <th className="w-20 text-center">Status</th>
                                                <th>Lesson Title</th>
                                                <th className="w-40">Subject Area</th>
                                                <th className="w-40">Notes</th>
                                                <th className="w-20 text-center">Open</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {Object.values(lessons).map(l => (
                                                <tr key={l.title} className="row-hover transition-colors">
                                                    <td className="text-center">
                                                        <div onClick={() => cycleStatus(l.title)} className={`status-dot mx-auto state-${l.status}`}></div>
                                                    </td>
                                                    <td className="font-bold text-slate-700">{l.title}</td>
                                                    <td><span className="text-[10px] font-bold px-2 py-1 bg-slate-100 rounded text-slate-500 uppercase tracking-widest">{l.subject}</span></td>
                                                    <td className="text-xs text-slate-400 italic">{l.notes ? 'Populated' : 'Empty'}</td>
                                                    <td className="text-center">
                                                        <button 
                                                            onClick={() => { setActiveLesson(l); setView('PROCESSOR'); setRawInput(l.notes); setGeneratedHtml(l.content); }}
                                                            className="p-2 text-slate-300 hover:text-amber-600 transition-colors"
                                                        >
                                                            <Wand2 size={16} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    ) : (
                        /* Processor View */
                        <main className="flex-1 flex overflow-hidden">
                            <div className="w-1/2 p-10 border-r overflow-y-auto flex flex-col space-y-4">
                                <h2 className="serif text-3xl font-bold italic">{activeLesson?.title || "Select a Lesson"}</h2>
                                <textarea 
                                    className="flex-1 w-full p-8 bg-white border border-slate-200 rounded-[2rem] text-sm leading-relaxed outline-none focus:ring-4 focus:ring-amber-500/10 shadow-inner" 
                                    placeholder="Paste NoteGPT transcript here..." 
                                    value={rawInput} 
                                    onChange={e => setRawInput(e.target.value)} 
                                />
                                <button onClick={processAI} disabled={isProcessing || !activeLesson} className="bg-slate-900 text-white p-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-xl hover:bg-black transition-all">
                                    {isProcessing ? <Loader2 className="animate-spin" /> : <Wand2 />} Generate Album Module
                                </button>
                            </div>
                            <div className="w-1/2 p-10 bg-slate-50 overflow-y-auto">
                                {generatedHtml ? (
                                    <div className="bg-white p-12 rounded-[2.5rem] shadow-xl shadow-slate-200/50 serif preview-container relative">
                                        <button onClick={() => navigator.clipboard.writeText(generatedHtml)} className="absolute top-8 right-8 p-2 text-slate-400 hover:text-amber-600"><Copy size={16}/></button>
                                        <div dangerouslySetInnerHTML={{ __html: generatedHtml }} />
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 italic border-4 border-dashed border-white rounded-[3rem]">
                                        <FileText size={64} className="mb-4 opacity-10" />
                                        <p>Select a lesson from the spreadsheet to begin</p>
                                    </div>
                                )}
                            </div>
                        </main>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
