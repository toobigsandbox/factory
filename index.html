<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Repository | Elim Lee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --paper: #fdfbf7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: #1e293b; }
        .serif { font-family: 'Crimson Pro', serif; }
        
        .subject-card {
            background: white;
            border-radius: 2.5rem;
            border: 1px solid #e2e8f0;
            padding: 2rem;
            transition: all 0.3s ease;
            height: 100%;
        }
        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            cursor: pointer;
            flex-shrink: 0;
        }
        .state-pending .status-dot { background: transparent; }
        .state-progress .status-dot { background: #f59e0b; border-color: #f59e0b; }
        .state-done .status-dot { background: #10b981; border-color: #10b981; }

        .lesson-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.4rem 0;
            font-size: 0.85rem;
            color: #64748b;
            transition: color 0.2s;
        }
        .lesson-link:hover { color: #b45309; text-decoration: underline; }
        .state-done .lesson-link { font-weight: 600; color: #1e293b; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-start gap-8">
        <div>
            <h1 class="serif text-6xl font-bold text-slate-900 tracking-tight mb-4">Album Repository</h1>
            <div class="flex flex-wrap items-center gap-3">
                <span class="bg-black text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Elim Lee // AMI Elementary</span>
                <span class="text-amber-600 italic font-bold serif text-xl">Target: April 1st</span>
            </div>
        </div>
        <div class="no-print">
            <button onclick="window.print()" class="bg-slate-900 text-white p-4 rounded-2xl hover:bg-black transition-all shadow-lg">
                <i data-lucide="printer" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main id="repo-grid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- JS will populate cards here -->
    </main>

    <footer class="max-w-7xl mx-auto mt-24 border-t border-slate-200 pt-12 text-center text-[10px] font-bold uppercase tracking-[0.4em] text-slate-400 no-print">
        <div class="flex justify-between items-center">
            <p>AMI Elementary 6-12 Curriculum Archive</p>
            <button onclick="resetStorage()" class="hover:text-red-500">Reset Tracker</button>
        </div>
    </footer>

    <script>
        const REPO_DATA = {
            "Geography": { icon: "globe", color: "bg-cyan-500", lessons: ["God With No Hands", "Earth as a Sphere", "Sun and Earth", "Protection of Atmosphere", "Temperature Zones", "Work of Air", "Work of Water"] },
            "Geometry": { icon: "triangle", color: "bg-emerald-500", lessons: ["Story of Geometry", "Nomenclature of Polygons", "Euclid's Plate", "Pythagoras I & II", "Area (Yellow Material)"] },
            "Math": { icon: "calculator", color: "bg-blue-600", lessons: ["Story of Numerals", "Hierarchical Material", "Multiples & Factors", "Decimal Fractions I", "Decimal Fractions II"] },
            "Biology": { icon: "leaf", color: "bg-green-600", lessons: ["Coming of Life", "Plants' Story", "Needs of Plant", "Scientific Classification", "The Great River"] },
            "History": { icon: "history", color: "bg-stone-800", lessons: ["The Black Strip", "Coming of Human Beings", "Hand Timeline", "Clock of Eras", "Fundamental Needs"] },
            "Language": { icon: "type", color: "bg-orange-600", lessons: ["Written Language", "Spoken Language", "Grammar Boxes", "Word Study", "Logical Analysis"] },
            "Music": { icon: "music", color: "bg-indigo-600", lessons: ["Singing with Scale", "Rhythm Patterns", "Tone Bars"] },
            "Theory": { icon: "book-open", color: "bg-rose-500", lessons: ["Four Planes", "Cosmic Education", "Freedom & Responsibility", "Going Out", "Observation"] }
        };

        let progress = JSON.parse(localStorage.getItem('master_repo_v3')) || {};

        function save() { localStorage.setItem('master_repo_v3', JSON.stringify(progress)); }

        function toggle(id) {
            const states = ['pending', 'progress', 'done'];
            const current = progress[id] || 'pending';
            progress[id] = states[(states.indexOf(current) + 1) % 3];
            save();
            render();
        }

        function resetStorage() { if(confirm("Reset all status marks?")) { progress = {}; save(); render(); } }

        function render() {
            const grid = document.getElementById('repo-grid');
            grid.innerHTML = '';

            Object.entries(REPO_DATA).forEach(([title, data]) => {
                const section = document.createElement('section');
                section.className = 'subject-card';
                
                const lessonsHtml = data.lessons.map(lesson => {
                    const id = `${title.toLowerCase()}-${lesson.replace(/\s+/g, '-').toLowerCase()}`;
                    const state = progress[id] || 'pending';
                    
                    // The path fix: Remove apostrophes and handle spaces
                    const cleanName = lesson.replace(/'/g, '').replace(/\s+/g, '-').toLowerCase();
                    const path = `lessons/${title.toLowerCase()}/${cleanName}.html`;
                    
                    return `
                        <div class="state-${state} flex items-center gap-3">
                            <div class="status-dot" onclick="toggle('${id}')"></div>
                            <a href="${path}" class="lesson-link">${lesson}</a>
                        </div>
                    `;
                }).join('');

                section.innerHTML = `
                    <div class="flex items-center gap-4 mb-6">
                        <div class="${data.color} p-2 rounded-xl text-white"><i data-lucide="${data.icon}" class="w-5 h-5"></i></div>
                        <h2 class="serif text-2xl font-bold text-slate-800">${title}</h2>
                    </div>
                    <div class="space-y-1">${lessonsHtml}</div>
                `;
                grid.appendChild(section);
            });
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
